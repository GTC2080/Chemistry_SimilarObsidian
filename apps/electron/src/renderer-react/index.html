<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
    <title>Nexus</title>
    <style>
      body { margin: 0; background: #0A0A0A; overflow: hidden; }
      #pre-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 24px;
        background: #0A0A0A;
        animation: _splashIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
      }
      #pre-splash .glow {
        position: absolute; inset: -16px;
        border-radius: 28px;
        background: radial-gradient(circle, rgba(10,132,255,0.35) 0%, transparent 70%);
        animation: _splashGlow 2.4s ease-in-out infinite;
      }
      #pre-splash .logo-wrap { position: relative; }
      #pre-splash .logo {
        width: 64px; height: 64px; border-radius: 16px; position: relative; z-index: 1;
        animation: _splashIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both;
      }
      #pre-splash .bar-track {
        width: 96px; height: 2px; border-radius: 2px; overflow: hidden;
        background: rgba(255,255,255,0.06);
      }
      #pre-splash .bar {
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, #0A84FF, transparent);
        animation: _splashBar 1.4s cubic-bezier(0.45,0,0.55,1) infinite;
      }
      #pre-splash.fade-out {
        opacity: 0; pointer-events: none;
        transition: opacity 0.3s ease-out;
      }
      @keyframes _splashIn {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes _splashGlow {
        0%, 100% { opacity: 0.25; transform: scale(1); }
        50%      { opacity: 0.6;  transform: scale(1.15); }
      }
      @keyframes _splashBar {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(0%); }
        100% { transform: translateX(100%); }
      }
    </style>
  </head>
  <body>
    <div id="pre-splash">
      <div class="logo-wrap">
        <div class="glow"></div>
        <img class="logo" src="./assets/logo.svg" alt="Nexus" />
      </div>
      <div class="bar-track"><div class="bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
  </html>
