<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chemistry_Obsidian Host Shell</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        line-height: 1.5;
        background:
          radial-gradient(circle at top right, rgba(122, 92, 255, 0.18), transparent 26%),
          linear-gradient(180deg, #17161c 0%, #111015 100%);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, rgba(122, 92, 255, 0.18), transparent 26%),
          linear-gradient(180deg, #17161c 0%, #111015 100%);
        color: #f5f3ff;
        overflow: hidden;
      }

      #app-root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Baseline markers retained for host smoke compatibility -->
    <h1 id="host-shell-marker" style="display:none;">Electron host shell baseline</h1>
    <p id="host-shell-detail" style="display:none;">Preload bridge ready</p>

    <div id="app-root">
      <div style="display:grid;place-items:center;min-height:100vh;">
        <div style="text-align:center;color:#6b7280;">Loading app shell...</div>
      </div>
    </div>
    <script type="module" src="./renderer-entry.js"></script>
  </body>
</html>
