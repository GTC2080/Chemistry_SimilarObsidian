<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chemistry_Obsidian Host Shell</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        line-height: 1.5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f4f6;
        color: #1f2937;
      }

      #app-root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Baseline markers retained for host smoke compatibility -->
    <h1 id="host-shell-marker" style="display:none;">Electron host shell baseline</h1>
    <p id="host-shell-detail" style="display:none;">Preload bridge ready</p>

    <div id="app-root">
      <div style="display:grid;place-items:center;min-height:100vh;">
        <div style="text-align:center;color:#6b7280;">Loading app shell...</div>
      </div>
    </div>
    <script type="module">
      import { appShell } from "./app-shell.js";
      appShell.init().catch((err) => {
        console.error("App shell init failed:", err);
        document.getElementById("app-root").innerHTML =
          '<div style="padding:32px;text-align:center;color:#7f1d1d;">Failed to initialize app shell.</div>';
      });
    </script>
  </body>
</html>
